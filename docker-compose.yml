version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mind-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: mind
      MONGO_INITDB_ROOT_PASSWORD: mind_secret
      MONGO_INITDB_DATABASE: mind
    volumes:
      - mind_mongo_data:/data/db

volumes:
  mind_mongo_data:
